<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保溫瓶一日店長流程產生器 v3</title>
    <style>
        :root {
            --primary-color: #0284c7;
            --primary-hover: #0369a1;
            --bg-color: #f0fdf4;
            --card-bg: #ffffff;
            --text-color: #0f172a;
            --border-color: #cbd5e1;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            display: flex;
            gap: 20px;
            max-width: 1300px;
            width: 100%;
        }

        .panel {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            flex: 1;
        }

        h2 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: white;
        }

        .time-select-container {
            display: flex;
            gap: 10px;
        }

        .time-select-container select {
            flex: 1;
        }

        .step-list {
            max-height: 450px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .step-row {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-bottom: 12px;
            background: #f8fafc;
            padding: 8px 12px;
            border-radius: 6px;
            border-left: 4px solid var(--primary-color);
            transition: all 0.2s;
        }

        .step-row.disabled {
            border-left-color: #cbd5e1;
            opacity: 0.5;
            background: #f1f5f9;
        }

        .step-row label {
            flex: 3;
            margin-bottom: 0;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
        }

        .step-row input[type="number"] {
            width: 70px;
            padding: 6px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            text-align: center;
        }

        .step-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        textarea {
            width: 100%;
            height: 580px;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
            font-family: monospace;
            font-size: 14px;
            line-height: 1.6;
            resize: none;
            background-color: #fafafa;
        }

        .btn-copy {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
            transition: background 0.2s;
        }

        .btn-copy:hover {
            background-color: var(--primary-hover);
        }

        .success-toast {
            display: none;
            text-align: center;
            color: #16a34a;
            font-weight: bold;
            margin-top: 10px;
        }

        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 左側：參數修改 -->
    <div class="panel">
        <h2>⚙️ 參數設定</h2>
        
        <div class="form-group">
            <label for="managerName">👤 一日店長姓名</label>
            <input type="text" id="managerName" value="李藝斌">
        </div>

        <div class="form-group">
            <label>⏱️ 活動開始時間 (10分鐘為單位)</label>
            <div class="time-select-container">
                <select id="startHour">
                    <option value="00">00 點</option><option value="01">01 點</option><option value="02">02 點</option>
                    <option value="03">03 點</option><option value="04">04 點</option><option value="05">05 點</option>
                    <option value="06">06 點</option><option value="07">07 點</option><option value="08">08 點</option>
                    <option value="09">09 點</option><option value="10">10 點</option><option value="11">11 點</option>
                    <option value="12" selected>12 點</option><option value="13">13 點</option><option value="14">14 點</option>
                    <option value="15">15 點</option><option value="16">16 點</option><option value="17">17 點</option>
                    <option value="18">18 點</option><option value="19">19 點</option><option value="20">20 點</option>
                    <option value="21">21 點</option><option value="22">22 點</option><option value="23">23 點</option>
                </select>
                <select id="startMin">
                    <option value="00" selected>00 分</option>
                    <option value="10">10 分</option>
                    <option value="20">20 分</option>
                    <option value="30">30 分</option>
                    <option value="40">40 分</option>
                    <option value="50">50 分</option>
                </select>
            </div>
        </div>

        <hr style="border: 0; border-top: 1px solid var(--border-color); margin: 20px 0;">
        
        <label>⏱️ 各環節時長與開關 (取消勾選即可移除該項目)</label>
        <div class="step-list">
            <div class="step-row" id="row1">
                <input type="checkbox" id="cb1" checked>
                <label for="cb1">1. 開場 (向粉絲打招呼/擺拍/開場舞)</label>
                <input type="number" id="d1" value="5" min="0">
            </div>
            <div class="step-row" id="row2">
                <input type="checkbox" id="cb2" checked>
                <label for="cb2">2. 保溫瓶挑選＆創作互動 (雷雕設計)</label>
                <input type="number" id="d2" value="10" min="0">
            </div>
            <div class="step-row" id="row3">
                <input type="checkbox" id="cb3" checked>
                <label for="cb3">3. 保溫瓶加購 (上台協助搭配)</label>
                <input type="number" id="d3" value="5" min="0">
            </div>
            <div class="step-row" id="row4">
                <input type="checkbox" id="cb4" checked>
                <label for="cb4">4. 互動時間 (趣味遊戲與懲罰舞蹈)</label>
                <input type="number" id="d4" value="10" min="0">
            </div>
            <div class="step-row" id="row5">
                <input type="checkbox" id="cb5" checked>
                <label for="cb5">5. 全體大合照</label>
                <input type="number" id="d5" value="3" min="0">
            </div>
            <div class="step-row" id="row6">
                <input type="checkbox" id="cb6" checked>
                <label for="cb6">6. 保溫瓶雷雕作品現場競標</label>
                <input type="number" id="d6" value="7" min="0">
            </div>
            <div class="step-row" id="row7">
                <input type="checkbox" id="cb7" checked>
                <label for="cb7">7. 1:1 人形立牌現場競標</label>
                <input type="number" id="d7" value="5" min="0">
            </div>
            <div class="step-row" id="row8">
                <input type="checkbox" id="cb8" checked>
                <label for="cb8">8. 個別合照時間 (手機/相機/拍立得)</label>
                <input type="number" id="d8" value="30" min="0">
            </div>
            <div class="step-row" id="row9">
                <input type="checkbox" id="cb9" checked>
                <label for="cb9">9. 簽名互動時間 (限球團相關/私物認定)</label>
                <input type="number" id="d9" value="60" min="0">
            </div>
            <div class="step-row" id="row10">
                <input type="checkbox" id="cb10" checked>
                <label for="cb10">10. 活動緩衝時間</label>
                <input type="number" id="d10" value="5" min="0">
            </div>
        </div>
    </div>

    <!-- 右側：即時文字輸出 -->
    <div class="panel">
        <h2>📋 自動生成行程表</h2>
        <textarea id="outputText" readonly></textarea>
        <button class="btn-copy" onclick="copyToClipboard()">一鍵複製行程文字</button>
        <div id="successToast" class="success-toast">✨ 複製成功！可以直接貼到 LINE 囉！</div>
    </div>
</div>

<script>
    // 時間加法輔助函式
    function addMinutes(timeStr, minutes) {
        const [hours, mins] = timeStr.split(':').map(Number);
        const date = new Date();
        date.setHours(hours);
        date.setMinutes(mins + minutes);
        return date.toTimeString().split(' ')[0].substring(0, 5);
    }

    function generateItinerary() {
        const name = document.getElementById('managerName').value || '店長';
        
        // 取得下拉選單時間
        const hr = document.getElementById('startHour').value;
        const mn = document.getElementById('startMin').value;
        let currentTime = `${hr}:${mn}`;

        // 所有環節原始資料
        const stepsData = [
            { id: 1, getText: (s, e, d) => `\n​${s}－${e}｜開場 (${d} min)\n• 一日店長（${name}）進場，向現場粉絲打招呼與自我介紹、現場擺拍 2min\n• 開場舞 3min` },
            { id: 2, getText: (s, e, d) => `\n​${s}－${e}｜保溫瓶挑選＆創作互動 (${d} min)\n• 引導至展示區挑選保溫瓶，分享挑選原因。\n• 現場繪圖設計雷射雕刻圖案，雷雕製作同步進行。` },
            { id: 3, getText: (s, e, d) => `\n​${s}－${e}｜保溫瓶加購 (${d} min)\n• 邀請 2 位現場購買保溫瓶的粉絲上台，協助搭配保溫瓶款式與顏色。` },
            { id: 4, getText: (s, e, d) => `\n​${s}－${e}｜互動時間 (${d} min)\n• 抽選粉絲上台進行趣味互動遊戲。\n• 獲勝者拿拍立得，落敗者與 ${name} 一起進行懲罰舞蹈挑戰。` },
            { id: 5, getText: (s, e, d) => `\n​${s}－${e}｜大合照 (${d} min)\n• 全體粉絲與 ${name} 一日店長大合照。` },
            { id: 6, getText: (s, e, d) => `\n​${s}－${e}｜保溫瓶競標 (${d} min)\n• 進行雷雕作品現場競標（3000 起標，1 標 500）。\n• 得標者上台與 ${name} 合照。` },
            { id: 7, getText: (s, e, d) => `\n​${s}－${e}｜立牌競標 (${d} min)\n• 1:1 人形立牌現場競標（3000 起標，1 標 500）。\n• 得標者上台與 ${name} 合照。` },
            { id: 8, getText: (s, e, d) => `\n​${s}－${e}｜合照時間 (${d} min)\n• 與粉絲個別進行拍立得及手機相機合照\n（手機+相機+拍立得）30位\n（手機+相機）30位\n 共 60 位` },
            { id: 9, getText: (s, e, d) => `\n​${s}－${e}｜簽名時間 (${d} min)\n• 簽名互動（共計 60 位）。\n• 一個資格各可簽 2 樣物品，僅限活動感謝簽名板或所屬職業球團相關商品，私人物品以現場認定。\n1.空白球需署名，請提前準備好署名小紙條以利活動順利進行。\n2.任何小卡類物品恕不開放簽名。` },
            { id: 10, getText: (s, e, d) => `\n​${s}－${e}｜緩衝時間 ` }
        ];

        let resultText = `✨ 【${name}】一日店長活動流程 ✨\n`;

        stepsData.forEach(step => {
            const isChecked = document.getElementById(`cb${step.id}`).checked;
            const rowElem = document.getElementById(`row${step.id}`);
            const durationInput = document.getElementById(`d${step.id}`);
            
            if (isChecked) {
                rowElem.classList.remove('disabled');
                durationInput.removeAttribute('disabled');
                
                const duration = parseInt(durationInput.value) || 0;
                const nextTime = addMinutes(currentTime, duration);
                
                resultText += step.getText(currentTime, nextTime, duration);
                currentTime = nextTime;
            } else {
                rowElem.classList.add('disabled');
                durationInput.setAttribute('disabled', 'true');
            }
        });

        resultText += `\n\n${currentTime} ～\n• 活動收尾、工作人員整理與場地控管。`;

        document.getElementById('outputText').value = resultText;
    }

    function copyToClipboard() {
        const outputText = document.getElementById('outputText');
        outputText.select();
        outputText.setSelectionRange(0, 99999);
        navigator.clipboard.writeText(outputText.value);

        const toast = document.getElementById('successToast');
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    // 當頁面載入完成，直接綁定事件並顯示初次結果
    window.addEventListener('DOMContentLoaded', () => {
        document.querySelectorAll('input, select').forEach(element => {
            element.addEventListener('change', generateItinerary);
            element.addEventListener('input', generateItinerary);
        });
        generateItinerary();
    });
</script>

</body>
</html>
